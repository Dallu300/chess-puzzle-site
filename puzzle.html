<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Chess Puzzle Viewer</title>

<style>
body { font-family: sans-serif; text-align: center; background:#f3f3f3; padding:20px; }
textarea { width:80%; height:200px; }
#board { margin:20px auto; width:420px; background:white; }
button { padding:8px 14px; margin:5px; }
</style>
</head>

<body>

<h2>체스 퍼즐</h2>

<textarea id="pgn"></textarea><br>
<button onclick="load()">퍼즐 생성</button>
<button onclick="next()">다음</button>

<div id="board"></div>
<div id="info"></div>

<input id="answer" placeholder="정답 입력">
<button onclick="check()">확인</button>
<button onclick="show()">정답 보기</button>

<div id="result"></div>

<p style="font-size:12px;color:#666;">Powered by Stockfish</p>

<script>
let puzzles = []
let index = 0

async function load() {
  const pgn = document.getElementById("pgn").value

  const res = await fetch("/analyze", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({pgn})
  })

  puzzles = await res.json()
  index = 0
  showPuzzle()
}

function showPuzzle() {
  if (!puzzles.length) return

  let p = puzzles[index]
  document.getElementById("board").innerHTML = p.svg
  document.getElementById("info").innerText =
    `${index+1}/${puzzles.length} | ${p.side}`
  document.getElementById("result").innerText = ""
  document.getElementById("answer").value = ""
}

function next() {
  if (index < puzzles.length-1) {
    index++
    showPuzzle()
  }
}

function norm(x) {
  return x.replace(/[+#]/g,"").toLowerCase()
}

function check() {
  let user = norm(document.getElementById("answer").value)
  let correct = norm(puzzles[index].answer)

  document.getElementById("result").innerText =
    user === correct ? "정답" : "오답"
}

function show() {
  document.getElementById("result").innerText =
    "정답: " + puzzles[index].answer
}
</script>

</body>
</html>
